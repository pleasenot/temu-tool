<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      width: 300px;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #f9fafb;
    }
    .header {
      background: #2563eb;
      color: white;
      padding: 16px;
    }
    .header h1 { font-size: 16px; font-weight: 600; }
    .header p { font-size: 12px; opacity: 0.8; margin-top: 4px; }
    .status {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 12px 16px;
      background: white;
      border-bottom: 1px solid #e5e7eb;
    }
    .status-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
    }
    .status-dot.connected { background: #22c55e; }
    .status-dot.disconnected { background: #ef4444; }
    .status-text { font-size: 13px; color: #374151; }
    .actions { padding: 12px 16px; }
    .btn {
      display: block;
      width: 100%;
      padding: 10px;
      margin-bottom: 8px;
      border: none;
      border-radius: 6px;
      font-size: 13px;
      font-weight: 500;
      cursor: pointer;
      transition: background 0.2s;
    }
    .btn-primary {
      background: #2563eb;
      color: white;
    }
    .btn-primary:hover { background: #1d4ed8; }
    .btn-secondary {
      background: #f3f4f6;
      color: #374151;
      border: 1px solid #e5e7eb;
    }
    .btn-secondary:hover { background: #e5e7eb; }
    .info {
      padding: 8px 16px 16px;
      font-size: 11px;
      color: #9ca3af;
    }
  </style>
</head>
<body>
  <div class="header">
    <h1 id="title"></h1>
    <p id="subtitle"></p>
  </div>

  <div class="status">
    <div class="status-dot" id="statusDot"></div>
    <span class="status-text" id="statusText"></span>
  </div>

  <div class="actions">
    <button class="btn btn-primary" id="openDashboard"></button>
    <button class="btn btn-secondary" id="collectCurrent"></button>
  </div>

  <div class="info" id="infoText"></div>

  <script src="popup.js"></script>
</body>
</html>
